{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h3 class="fw-bold mb-3">✏️ Edit Transaction</h3>

    <form method="POST" class="mt-2">

        <div class="mb-3">
            <label class="form-label">Receiver Name</label>
            <input type="text" name="receiver_name" class="form-control"
                   value="{{ transaction.receiver_name }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Receiver Phone</label>
            <input type="text" name="receiver_phone" class="form-control"
                   value="{{ transaction.receiver_phone }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" name="amount" step="0.01" class="form-control"
                   value="{{ transaction.amount }}" required>
        </div>

        <div class="mb-3">
            <p class="mb-1">Commission (2%): <strong>{{ transaction.commission }}</strong></p>
        </div>

        <div class="d-flex flex-column flex-sm-row gap-2">
            <button type="submit" class="btn btn-success flex-grow-1">Update Transaction</button>
            <a href="{{ url_for('transfer.recent_transactions_view') }}" class="btn btn-secondary flex-grow-1">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
