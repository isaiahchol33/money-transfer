{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}

<div class="modal fade show d-block" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered modal-lg">

        <div class="modal-content shadow-lg border-0 rounded-4 p-3">

            <!-- HEADER -->
            <div class="modal-header border-0">
                <h6 class="modal-title fw-bold text-primary">
                    👤 Edit Profile
                </h6>

                <a href="{{ url_for('dashboard.dashboard_home') }}"
                   class="btn-close"></a>
            </div>

            <form method="POST" enctype="multipart/form-data">

                <!-- ✅ CSRF TOKEN (IMPORTANT FIX) -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="modal-body">

                    <div class="row g-3">

                        <!-- IMAGE -->
                        <div class="col-md-4 text-center">

                            <div class="position-relative d-inline-block">

                                <img id="profilePreview"
                                     src="{% if current_user.profile_image %}
                                            {{ url_for('static', filename='uploads/' ~ current_user.profile_image) }}
                                          {% else %}
                                            {{ url_for('static', filename='uploads/default.png') }}
                                          {% endif %}"
                                     class="rounded-circle border shadow"
                                     width="120" height="120"
                                     style="object-fit: cover;">

                                <label for="profile_image"
                                       class="position-absolute bottom-0 end-0 bg-primary text-white rounded-circle p-2 shadow"
                                       style="cursor:pointer;">
                                    ✏️
                                </label>

                            </div>

                            <input type="file"
                                   name="profile_image"
                                   id="profile_image"
                                   class="d-none"
                                   accept="image/*"
                                   onchange="previewImage(event)">

                            <div class="mt-2 small">
                                <strong>{{ current_user.username }}</strong><br>
                                <span class="text-muted">{{ current_user.role|title }}</span>
                            </div>

                        </div>

                        <!-- FORM -->
                        <div class="col-md-8">

                            <!-- USERNAME -->
                            <div class="mb-2">
                                <label class="form-label small">Username</label>
                                <input type="text"
                                       name="username"
                                       value="{{ current_user.username }}"
                                       class="form-control form-control-sm"
                                       required>
                            </div>

                            <!-- PHONE -->
                            <div class="mb-2">
                                <label class="form-label small">Phone</label>
                                <input type="text"
                                       name="phone"
                                       value="{{ current_user.phone_no or '' }}"
                                       class="form-control form-control-sm">
                            </div>

                            <!-- LOCATION -->
                            <div class="mb-2">
                                <label class="form-label small">Location</label>
                                <input type="text"
                                       name="location"
                                       value="{{ current_user.location or '' }}"
                                       class="form-control form-control-sm">
                            </div>

                            <!-- PASSWORD -->
                            <details class="mb-2">
                                <summary class="fw-bold text-primary small">
                                    🔐 Change Password
                                </summary>

                                <div class="mt-2">
                                    <input type="password" name="current_password"
                                           class="form-control form-control-sm mb-1"
                                           placeholder="Current Password">

                                    <input type="password" name="new_password"
                                           class="form-control form-control-sm mb-1"
                                           placeholder="New Password">

                                    <input type="password" name="confirm_password"
                                           class="form-control form-control-sm"
                                           placeholder="Confirm Password">
                                </div>
                            </details>

                            <!-- PIN -->
                            <details>
                                <summary class="fw-bold text-primary small">
                                    🔢 Change PIN
                                </summary>

                                <div class="mt-2">
                                    <input type="password" name="current_pin"
                                           class="form-control form-control-sm mb-1"
                                           placeholder="Current PIN">

                                    <input type="password" name="new_pin"
                                           class="form-control form-control-sm mb-1"
                                           placeholder="New PIN">

                                    <input type="password" name="confirm_pin"
                                           class="form-control form-control-sm"
                                           placeholder="Confirm PIN">
                                </div>
                            </details>

                        </div>

                    </div>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer border-0 d-flex justify-content-between">

                    <a href="{{ url_for('dashboard.dashboard_home') }}"
                       class="btn btn-secondary btn-sm">
                        Cancel
                    </a>

                    <button class="btn btn-success btn-sm px-3">
                        Save
                    </button>

                </div>

            </form>

        </div>
    </div>
</div>

<div class="modal-backdrop fade show"></div>

<!-- ================= SCRIPT ================= -->

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function () {
        document.getElementById("profilePreview").src = reader.result;
    };
    reader.readAsDataURL(event.target.files[0]);
}
</script>

<!-- ================= STYLE ================= -->
<style>
.modal-content{
    border-radius:14px;
    max-height:90vh;
    overflow-y:auto;
    font-size:13px;
}

summary{
    cursor:pointer;
    list-style:none;
    font-size:13px;
}

summary::-webkit-details-marker{
    display:none;
}
</style>

{% endblock %}
