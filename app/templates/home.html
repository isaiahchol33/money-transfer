{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center min-vh-100 gradient-bg">

    <div class="glass-card text-center p-4 p-md-5 rounded-4">

        <!-- LOGO / TITLE -->
        <h1 class="fw-bold mb-2 display-5">💳 Money Transfer</h1>
        <p class="text-muted small mb-4">
            Fast, secure, and easy money transfers anywhere, anytime
        </p>

        <!-- IMAGE -->
        <img src="{{ url_for('static', filename='images/bank-card.png') }}" 
             alt="Money Transfer" 
             class="img-fluid mb-4 main-image">

        <!-- ACTION BUTTONS -->
        <div class="d-flex justify-content-center gap-3 mb-4 flex-wrap">
            <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg rounded-pill px-4 py-2 shadow-sm w-100 w-sm-auto">
                Login
            </a>
            <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary btn-lg rounded-pill px-4 py-2 shadow-sm w-100 w-sm-auto">
                Register
            </a>
        </div>

        <!-- FEATURES / BADGES -->
        <div class="d-flex justify-content-center gap-2 flex-wrap mt-3">
            <span class="badge feature-badge">⚡ Fast</span>
            <span class="badge feature-badge">🔒 Secure</span>
            <span class="badge feature-badge">📊 Track</span>
        </div>

    </div>

</div>


{% endblock %}
