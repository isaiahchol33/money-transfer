{% extends 'base.html' %}

{% block title %}Transfer Money{% endblock %}

{% block content %}

<div class="container py-3">

    <!-- HEADER (reduced spacing) -->
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3 text-center text-md-start">

        <h3 class="fw-bold text-primary mb-0 d-flex align-items-center gap-2 justify-content-center justify-content-md-start">
            💸 <span>Transfer Money</span>
        </h3>

        <div class="d-flex gap-2 flex-wrap justify-content-center justify-content-md-end">
            <span class="badge bg-info px-3 py-2 rounded-pill shadow-sm">Secure</span>
            <span class="badge bg-dark px-3 py-2 rounded-pill shadow-sm">
                {{ "%.2f"|format(wallet.balance if wallet else 0) }} SSP
            </span>
        </div>

    </div>

    <!-- FORM CARD -->
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

        <div class="bg-primary" style="height:3px;"></div>

        <div class="card-body p-3 p-md-4">

            <form method="POST" id="transferForm" novalidate>

                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row g-3">

                    <!-- LEFT -->
                    <div class="col-12 col-md-6">

                        <h6 class="fw-bold text-secondary border-bottom pb-1 mb-2">
                            Sender
                        </h6>

                        <div class="mb-2">
                            <label class="form-label small">Name</label>
                            <input type="text" id="sender_name" name="sender_name"
                                   class="form-control form-control-sm rounded-3 shadow-sm"
                                   placeholder="John Doe" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label small">Phone</label>
                            <input type="text" id="sender_phone" name="sender_phone"
                                   class="form-control form-control-sm rounded-3 shadow-sm"
                                   placeholder="912345678" required>
                        </div>

                        <h6 class="fw-bold text-secondary border-bottom pb-1 mt-3 mb-2">
                            Receiver
                        </h6>

                        <div class="mb-2">
                            <label class="form-label small">Location</label>
                            <select id="receiver_location" name="receiver_location"
                                    class="form-select form-select-sm rounded-3 shadow-sm" required>
                                <option value="">Select</option>
                                {% for loc in locations %}
                                    <option value="{{ loc }}">{{ loc }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-2">
                            <label class="form-label small">Name</label>
                            <input type="text" id="receiver_name" name="receiver_name"
                                   class="form-control form-control-sm rounded-3 shadow-sm"
                                   placeholder="Jane Smith" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label small">Phone</label>
                            <input type="text" id="receiver_phone" name="receiver_phone"
                                   class="form-control form-control-sm rounded-3 shadow-sm"
                                   placeholder="900123456" required>
                        </div>

                    </div>

                    <!-- RIGHT -->
                    <div class="col-12 col-md-6">

                        <h6 class="fw-bold text-success border-bottom pb-1 mb-2">
                            Transaction
                        </h6>

                        <label class="form-label small">Amount</label>
                        <input type="number" id="amount" name="amount"
                               class="form-control form-control-sm rounded-3 shadow-sm mb-2"
                               placeholder="Enter amount" min="1" required>

                        <div class="d-flex justify-content-between small p-2 rounded-3 mb-2 shadow-sm"
                             style="background:#f8f9fa;">
                            <span>Fee: <b id="commission">0.00</b></span>
                            <span>Total: <b id="total">0.00</b></span>
                        </div>

                        <div id="balanceWarning" class="text-danger fw-bold small mb-2"></div>

                        <label class="form-label small">PIN</label>
                        <input type="password" id="pin" name="pin"
                               class="form-control form-control-sm rounded-3 shadow-sm mb-2"
                               placeholder="4–6 digits" maxlength="6" required>

                        <div class="alert alert-info small py-2 mb-2 rounded-3">
                            ✔ Auto fee calculation<br>
                            ✔ Verify details<br>
                            ✔ Instant transfer
                        </div>

                        <button class="btn btn-success w-100 py-2 fw-bold rounded-3 shadow-sm"
                                id="submitBtn">
                            💸 Send Money
                        </button>

                    </div>

                </div>

            </form>

        </div>
    </div>

</div>

<!-- ================= JS (UNCHANGED) ================= -->
<script>
(function () {

    const form = document.getElementById("transferForm");
    const btn = document.getElementById("submitBtn");

    const walletBalance = parseFloat("{{ wallet.balance if wallet else 0 }}") || 0;

    const f = {
        sender_name: document.getElementById("sender_name"),
        sender_phone: document.getElementById("sender_phone"),
        receiver_name: document.getElementById("receiver_name"),
        receiver_phone: document.getElementById("receiver_phone"),
        amount: document.getElementById("amount"),
        pin: document.getElementById("pin"),
        location: document.getElementById("receiver_location")
    };

    function isName(v) {
        return /^[A-Za-z\s]{2,50}$/.test(v);
    }

    function isPhone(v) {
        return /^[0-9]{7,15}$/.test(v);
    }

    function showError(msg) {
        alert(msg);
    }

    f.amount.addEventListener("input", () => {
        let amt = parseFloat(f.amount.value) || 0;
        let commission = amt * 0.02;
        let total = amt + commission;

        document.getElementById("commission").innerText = commission.toFixed(2);
        document.getElementById("total").innerText = total.toFixed(2);

        document.getElementById("balanceWarning").innerText =
            total > walletBalance ? "❌ Insufficient wallet balance" : "";
    });

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        if (!isName(f.sender_name.value)) return showError("Invalid sender name");
        if (!isName(f.receiver_name.value)) return showError("Invalid receiver name");
        if (!isPhone(f.sender_phone.value)) return showError("Invalid sender phone");
        if (!isPhone(f.receiver_phone.value)) return showError("Invalid receiver phone");
        if (!f.location.value) return showError("Select receiver location");
        if (!f.amount.value || f.amount.value <= 0) return showError("Enter valid amount");

        let total = (parseFloat(f.amount.value) || 0) * 1.02;
        if (total > walletBalance) return showError("Insufficient balance");

        if (!/^\d{4,6}$/.test(f.pin.value)) return showError("PIN must be 4–6 digits");

        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const res = await fetch(form.action || window.location.href, {
                method: "POST",
                headers: { "X-Requested-With": "XMLHttpRequest" },
                body: new FormData(form)
            });

            const data = await res.json();

            if (!data.success) throw new Error(data.message || "Transfer failed");

            alert("✅ Transfer successful");

            setTimeout(() => {
                window.location.href = "/transfer/transactions";
            }, 1000);

        } catch (err) {
            showError(err.message || "Server error");
            btn.disabled = false;
            btn.innerText = "💸 Send Money";
        }
    });

})();
</script>

<!-- ================= MOBILE POLISH ================= -->
<style>
@media (max-width: 768px) {

    h3 {
        font-size: 1.2rem;
        text-align: center;
    }

    .card-body {
        padding: 1rem !important;
    }

    .form-control,
    .form-select {
        font-size: 14px;
    }

    .btn {
        font-size: 15px;
    }

}
</style>

{% endblock %}
