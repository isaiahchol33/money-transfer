{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100 px-2">
    <div class="card shadow-lg p-4 rounded-3 col-12 col-sm-10 col-md-6 col-lg-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Reset Password</h2>
            <p class="text-muted">Enter your email to receive reset instructions</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="d-grid mt-2">
                <button type="submit" class="btn btn-primary btn-lg">Send Reset Link</button>
            </div>
        </form>
    </div>
</div>

<style>

</style>
{% endblock %}
